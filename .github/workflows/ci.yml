name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: .github/scripts/yarn.lock

      - name: Install deps
        working-directory: .github/scripts
        run: yarn install --frozen-lockfile

      - name: Validate skills (frontmatter + examples vs bundled schema)
        working-directory: .github/scripts
        run: yarn validate
